# WeaveCast M1 — Topic definitions
#
# All topics are processed in bulk to produce:
#   - A full briefing video (3–5 min)
#   - Per-topic short clips (~30 sec each)
#   - A "Today's News" lineup image
#
# search_countries: search hints only — other countries may also be included.
# title_en:          English topic name (used for Gemini search queries and internal keys).
# title_target_lang: Display name in the output language (set via LANGUAGE in .env).
#                    Used for on-screen titles, narration, and image captions.

search_countries:
  - "United States"
  - "Iran"
  - "Israel"
  - "Russia"
  - "China"

topics:
  - title_en: "Strait of Hormuz blockade"
    title_target_lang: "ホルムズ海峡封鎖"
    query_keywords:
      - "Strait of Hormuz blockade 2026"
      - "Iran Hormuz closure shipping"
    importance_score: 9.0
    tags: ["hormuz", "iran", "shipping", "military"]

  - title_en: "New Iranian Supreme Leader"
    title_target_lang: "イラン新最高指導者"
    query_keywords:
      - "New Iranian Supreme Leader 2026"
      - "Mojtaba Khamenei supreme leader"
    importance_score: 8.5
    tags: ["iran", "leadership", "politics"]

  - title_en: "US military losses"
    title_target_lang: "アメリカ軍 損失"
    query_keywords:
      - "Iran's counterattack against the United States 2026"
      - "Losses of US Air Force aircraft"
    importance_score: 8.5
    tags: ["military", "damage", "war"]

  - title_en: "Airstrikes on girls schools in Iran"
    title_target_lang: "イラン女子校への空爆"
    query_keywords:
      - "Airstrikes on girls schools in Iran 2026"
    importance_score: 9.5
    tags: ["iran", "airstrikes", "civilian", "humanitarian"]
